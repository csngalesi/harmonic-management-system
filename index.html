══════════════════════════════════════════════════════════════ -->

            </form>

            <div class="login-separator"><span>ou</span></div>

                <a href="#" class="nav-link" data-route="fretboard7">

    <script src="js/components/guitarSampler.js?v=18"></script>

    <!-- SPA Controller -->
    <script src="js/app.js?v=22"></script>

    <!-- Service Worker registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.info('[HMS] SW registered:', reg.scope))
                    .catch(err => console.warn('[HMS] SW registration failed:', err));
            });
        }

        // ── Refresh button: desregistra SW, limpa cache e recarrega ──
        // Nota: este script roda no fim do <body>, então o DOM já está pronto —
        // não usar DOMContentLoaded (já disparou).
        (async function setupRefreshBtn() {
            const btn = document.getElementById('refresh-btn');
            if (!btn) return;
            btn.addEventListener('click', async () => {
                const icon = btn.querySelector('i');
                icon.style.animation = 'spin 1s linear infinite';
                btn.disabled = true;
                try {
                    // 1. Limpa todos os caches do SW
                    if ('caches' in window) {
                        const keys = await caches.keys();
                        await Promise.all(keys.map(k => caches.delete(k)));
                    }
                    // 2. Desregistra completamente o Service Worker
                    if ('serviceWorker' in navigator) {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        await Promise.all(regs.map(r => r.unregister()));
                    }
                } catch(e) {
                    console.warn('[HMS] cleanup error:', e);
                } finally {
                    // 3. Recarrega com cache-busting para garantir HTML fresco
                    const url = location.pathname + '?_=' + Date.now();
                    location.replace(url);
                }
            });
        })();
    </script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        #refresh-btn:hover { background: var(--glass-bg) !important; color: var(--text-secondary) !important; }
    </style>
