<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HMS — Harmonic Management System</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- HMS Styles -->
    <link rel="stylesheet" href="css/main.css" />
</head>

<body>

    <!-- ─── Global Loader ──────────────────────────────────────── -->
    <div id="global-loader" class="global-loader hidden">
        <div class="loader-pulse"></div>
    </div>

    <!-- ─── Toast Container ───────────────────────────────────── -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ─── Modal Overlay ─────────────────────────────────────── -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-container" class="modal-container"></div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════════════════════════════ -->
    <div id="login-screen" class="login-screen">
        <div class="login-card glass-panel">
            <div class="login-brand">
                <div class="login-logo">
                    <i class="fa-solid fa-music"></i>
                </div>
                <h1>HMS</h1>
                <p>Harmonic Management System</p>
            </div>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label class="form-label">E-mail</label>
                    <input type="email" id="login-email" class="form-input" placeholder="seu@email.com"
                        autocomplete="email" />
                </div>
                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••"
                        autocomplete="current-password" />
                </div>
                <div id="login-error" class="login-error hidden"></div>
                <button type="submit" class="btn btn-primary btn-full" id="login-btn">
                    <i class="fa-solid fa-right-to-bracket"></i> Entrar
                </button>
            </form>

            <div class="login-separator"><span>ou</span></div>

            <button class="btn btn-ghost btn-full" id="signup-btn">
                <i class="fa-solid fa-user-plus"></i> Criar conta
            </button>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
     APP SCREEN (SPA Shell)
══════════════════════════════════════════════════════════════ -->
    <div id="app-screen" class="app-screen hidden">

        <!-- Sidebar backdrop (mobile) -->
        <div id="sidebar-backdrop" class="sidebar-backdrop hidden"></div>

        <!-- ─── Sidebar ─────────────────────────────────────────── -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="brand-icon"><i class="fa-solid fa-music"></i></div>
                    <span class="brand-name">HMS</span>
                </div>
                <button id="sidebar-toggle" class="sidebar-toggle-btn" title="Recolher menu">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-label">Biblioteca</div>
                <a href="#" class="nav-link" data-route="repertoire">
                    <i class="fa-solid fa-list-music"></i>
                    <span>Repertório</span>
                </a>

                <div class="nav-section-label">Módulos</div>
                <a href="#" class="nav-link" data-route="player">
                    <i class="fa-solid fa-play-circle"></i>
                    <span>Player / Transpositor</span>
                </a>
                <a href="#" class="nav-link" data-route="analyzer">
                    <i class="fa-solid fa-magnifying-glass-chart"></i>
                    <span>Analisador Reverso</span>
                </a>
                <a href="#" class="nav-link" data-route="extractor">
                    <i class="fa-solid fa-microphone-lines"></i>
                    <span>Extrator de Áudio</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar"><i class="fa-solid fa-user"></i></div>
                    <div class="user-details">
                        <div id="user-name" class="user-name">Músico</div>
                        <div id="user-email" class="user-email">—</div>
                    </div>
                </div>
                <button id="logout-btn" class="btn-icon-sm" title="Sair">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </aside>

        <!-- ─── Main Area ────────────────────────────────────────── -->
        <div class="main-wrapper">

            <!-- Topbar (mobile) -->
            <header class="topbar">
                <button id="mobile-menu-btn" class="btn-icon" title="Menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="topbar-brand">
                    <i class="fa-solid fa-music"></i> HMS
                </div>
            </header>

            <!-- Content -->
            <main id="main-content" class="main-content">
                <!-- Injected by components -->
            </main>
        </div>

    </div>

    <!-- ══════════════════════════════════════════════════════════
     SCRIPTS (order matters)
══════════════════════════════════════════════════════════════ -->
    <!-- Supabase SDK (UMD) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <!-- SheetJS — Excel (.xlsx) parser -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <!-- HMS Core Engine -->
    <script src="js/core/harmonyEngine.js"></script>
    <script src="js/core/audioEngine.js"></script>

    <!-- Infrastructure -->
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>

    <!-- Components -->
    <script src="js/components/repertoire.js"></script>
    <script src="js/components/player.js"></script>
    <script src="js/components/analyzer.js"></script>
    <script src="js/components/extractor.js"></script>

    <!-- SPA Controller -->
    <script src="js/app.js"></script>

</body>

</html>
